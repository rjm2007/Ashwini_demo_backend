services:
  postgres:
    image: postgres:15
    container_name: warranty-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: warranty
      POSTGRES_USER: warranty_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - warranty-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: warranty-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - warranty-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: warranty-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    networks:
      - warranty-net

  docling:
    image: quay.io/docling-project/docling-serve
    container_name: warranty-docling
    ports:
      - "5001:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      start_period: 120s
      timeout: 15s
      retries: 10
    networks:
      - warranty-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: warranty-ai-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
      DOCLING_SERVE_URL: http://docling:5001
      PARSER_PRIMARY: docling_structured
      ENABLE_SECTION_CLASSIFICATION: "true"
      ENABLE_SCHEMA_PIPELINE: "true"
      ENABLE_VEHICLE_LLM_FALLBACK: "true"
      GATE_HEAVY_ON_CERTIFY: "true"
    volumes:
      - ./logs/services/ai-service:/app/logs
    depends_on:
      docling:
        condition: service_healthy
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    networks:
      - warranty-net


volumes:
  postgres_data:
  qdrant_data:

networks:
  warranty-net:
    driver: bridge
